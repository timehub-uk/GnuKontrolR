version: "3.9"

# ────────────────────────────────────────────────────────────────────────────
# WebPanel — Master Service Stack
#
# Master containers (one per service):
#   traefik     — reverse proxy + Let's Encrypt SSL
#   powerdns    — authoritative DNS
#   mysql       — shared relational DB (customer DBs live here, isolated by schema)
#   postfix     — outbound SMTP
#   dovecot     — IMAP/POP3 (mail delivery)
#   redis       — shared cache / session store
#   webpanel    — FastAPI control panel API
#   prometheus  — metrics scraper (CPU, memory, disk, containers)
#   grafana     — metrics dashboards (port 3000)
#
# Customer containers are created dynamically by docker_mgr.py on the same
# webpanel_net network. They are NOT defined here.
# ────────────────────────────────────────────────────────────────────────────

networks:
  webpanel_net:
    name: webpanel_net
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/16

volumes:
  traefik_certs:
  mysql_data:
  powerdns_data:
  postfix_data:
  dovecot_data:
  redis_data:
  webpanel_sites:   # /var/webpanel/sites — customer public_html
  webpanel_db:      # panel SQLite DB
  prometheus_data:
  grafana_data:

services:

  # ── Traefik ────────────────────────────────────────────────────────────────
  traefik:
    image: traefik:v3.0
    container_name: webpanel_traefik
    restart: unless-stopped
    networks:
      - webpanel_net
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"   # dashboard (restrict in prod)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_certs:/certs
      - ./docker/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
    labels:
      - traefik.enable=true
      - traefik.http.routers.traefik-dash.rule=Host(`traefik.panel.local`)
      - traefik.http.routers.traefik-dash.service=api@internal
    environment:
      - TZ=${TZ:-UTC}

  # ── PowerDNS ───────────────────────────────────────────────────────────────
  powerdns:
    image: powerdns/pdns-auth-48:latest
    container_name: webpanel_powerdns
    restart: unless-stopped
    networks:
      - webpanel_net
    ports:
      - "53:53/tcp"
      - "53:53/udp"
    volumes:
      - powerdns_data:/var/lib/powerdns
      - ./docker/powerdns/pdns.conf:/etc/powerdns/pdns.conf:ro
    environment:
      - PDNS_AUTH_API_KEY=${PDNS_API_KEY:-changeme_pdns_key}

  # ── MySQL Master ───────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: webpanel_mysql
    restart: unless-stopped
    networks:
      - webpanel_net
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-changeme_mysql_root}
      - MYSQL_DATABASE=webpanel
      - MYSQL_USER=webpanel
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-changeme_mysql}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5
      start_period: 30s

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: webpanel_redis
    restart: unless-stopped
    networks:
      - webpanel_net
    volumes:
      - redis_data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme_redis} --appendonly yes

  # ── Postfix (outbound SMTP) ────────────────────────────────────────────────
  postfix:
    image: boky/postfix:latest
    container_name: webpanel_postfix
    restart: unless-stopped
    networks:
      - webpanel_net
    ports:
      - "25:25"
      - "587:587"
    volumes:
      - postfix_data:/var/spool/postfix
      - ./docker/postfix/main.cf:/etc/postfix/main.cf:ro
    environment:
      - HOSTNAME=${MAIL_HOSTNAME:-mail.example.com}
      - RELAYHOST=${RELAYHOST:-}
      - ALLOWED_SENDER_DOMAINS=${ALLOWED_SENDER_DOMAINS:-}

  # ── Dovecot (IMAP/POP3) ────────────────────────────────────────────────────
  dovecot:
    image: dovecot/dovecot:latest
    container_name: webpanel_dovecot
    restart: unless-stopped
    networks:
      - webpanel_net
    ports:
      - "143:143"
      - "993:993"
      - "110:110"
      - "995:995"
    volumes:
      - dovecot_data:/var/mail
      - ./docker/dovecot/dovecot.conf:/etc/dovecot/dovecot.conf:ro

  # ── WebPanel API ───────────────────────────────────────────────────────────
  webpanel:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: webpanel_api
    restart: unless-stopped
    networks:
      - webpanel_net
    ports:
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock   # manage customer containers
      - webpanel_sites:/var/webpanel/sites           # customer files
      - webpanel_db:/data                            # SQLite DB
    environment:
      - SECRET_KEY=${SECRET_KEY:-change_me_in_production}
      - MYSQL_HOST=mysql
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-changeme_mysql}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-changeme_redis}@redis:6379/0
      - PDNS_API_URL=http://powerdns:8081
      - PDNS_API_KEY=${PDNS_API_KEY:-changeme_pdns_key}
      - SMTP_HOST=postfix
      - SITES_ROOT=/var/webpanel/sites
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    labels:
      - traefik.enable=true
      - traefik.http.routers.webpanel-api.rule=Host(`panel.local`) && PathPrefix(`/api`)
      - traefik.http.services.webpanel-api.loadbalancer.server.port=8000

  # ── Prometheus ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: webpanel_prometheus
    restart: unless-stopped
    networks:
      - webpanel_net
    volumes:
      - prometheus_data:/prometheus
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle

  # ── Grafana ────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: webpanel_grafana
    restart: unless-stopped
    networks:
      - webpanel_net
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-changeme_grafana}
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s:%(http_port)s/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_AUTH_ANONYMOUS_ENABLED=false
    labels:
      - traefik.enable=true
      - traefik.http.routers.grafana.rule=Host(`panel.local`) && PathPrefix(`/grafana`)
      - traefik.http.services.grafana.loadbalancer.server.port=3000

  # ── Node Exporter (host metrics for Prometheus) ────────────────────────────
  node-exporter:
    image: prom/node-exporter:latest
    container_name: webpanel_node_exporter
    restart: unless-stopped
    networks:
      - webpanel_net
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - --path.procfs=/host/proc
      - --path.rootfs=/rootfs
      - --path.sysfs=/host/sys
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)

  # ── cAdvisor (container metrics for Prometheus) ────────────────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: webpanel_cadvisor
    restart: unless-stopped
    networks:
      - webpanel_net
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
