version: "3.9"

# ────────────────────────────────────────────────────────────────────────────
# WebPanel — Master Service Stack
#
# Master containers (one per service):
#   traefik     — reverse proxy + Let's Encrypt SSL
#   powerdns    — authoritative DNS
#   mysql       — shared relational DB (customer DBs live here, isolated by schema)
#   postfix     — outbound SMTP
#   dovecot     — IMAP/POP3 (mail delivery)
#   redis       — shared cache / session store
#   webpanel    — FastAPI control panel API
#   prometheus  — metrics scraper (CPU, memory, disk, containers)
#   grafana     — metrics dashboards (port 3000)
#
# Customer containers are created dynamically by docker_mgr.py on the same
# webpanel_net network. They are NOT defined here.
# ────────────────────────────────────────────────────────────────────────────

networks:
  webpanel_net:
    name: webpanel_net
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/16

volumes:
  traefik_certs:
  mysql_data:
  powerdns_data:
  postfix_data:
  dovecot_data:
  redis_data:
  webpanel_sites:   # /var/webpanel/sites — customer public_html
  webpanel_db:      # panel SQLite DB
  prometheus_data:
  grafana_data:
  dkim_keys:        # DKIM private keys — written by panel API, read by OpenDKIM

services:

  # ── Docker API proxy ───────────────────────────────────────────────────────
  # nginx proxy in front of /var/run/docker.sock that rewrites legacy API
  # version paths (e.g. /v1.24/) to /v1.47/ so Traefik v3's Go Docker SDK
  # (which negotiates starting at v1.24) works with Docker Engine 29+ whose
  # minimum supported API is 1.40.
  docker-api-proxy:
    image: nginx:alpine
    container_name: webpanel_docker_api_proxy
    restart: unless-stopped
    user: root    # needs root to read docker.sock (gid 984 not available in alpine nginx)
    networks:
      - webpanel_net
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./docker/docker-api-proxy/nginx.conf:/etc/nginx/nginx.conf:ro
    # No external port exposure — internal to webpanel_net only

  # ── Traefik ────────────────────────────────────────────────────────────────
  traefik:
    image: traefik:v3.3
    container_name: webpanel_traefik
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 1.1.1.1
    networks:
      - webpanel_net
    ports:
      - "80:80"
      - "443:443"
      - "25:25"
      - "587:587"
      - "143:143"
      - "993:993"
      - "110:110"
      - "995:995"
    volumes:
      - traefik_certs:/certs
      - ./docker/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./docker/traefik/dynamic:/etc/traefik/dynamic:ro
    labels:
      - traefik.enable=true
      - traefik.http.routers.traefik-dash.rule=Host(`traefik.${PANEL_DOMAIN}`)
      - traefik.http.routers.traefik-dash.service=api@internal
    environment:
      - TZ=${TZ:-UTC}
      - ACME_EMAIL=${ACME_EMAIL}
      # Traefik native env var — overrides the static config value for ACME email.
      # This allows updating ACME_EMAIL in .env + docker compose up -d without
      # editing traefik.yml directly.
      - TRAEFIK_CERTIFICATESRESOLVERS_LE_ACME_EMAIL=${ACME_EMAIL}
    depends_on:
      - docker-api-proxy

  # ── PowerDNS ───────────────────────────────────────────────────────────────
  powerdns:
    image: powerdns/pdns-auth-49:latest
    container_name: webpanel_powerdns
    restart: unless-stopped
    networks:
      - webpanel_net
    ports:
      - "53:53/tcp"
      - "53:53/udp"
    volumes:
      - powerdns_data:/var/lib/powerdns
      - ./docker/powerdns/pdns.conf:/etc/powerdns/pdns.conf:ro
    environment:
      - PDNS_AUTH_API_KEY=${PDNS_API_KEY:-changeme_pdns_key}

  # ── MySQL Master ───────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.4
    container_name: webpanel_mysql
    restart: unless-stopped
    networks:
      - webpanel_net
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-changeme_mysql_root}
      - MYSQL_DATABASE=webpanel
      - MYSQL_USER=webpanel
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-changeme_mysql}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5
      start_period: 30s

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:8-alpine
    container_name: webpanel_redis
    restart: unless-stopped
    networks:
      - webpanel_net
    volumes:
      - redis_data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme_redis} --appendonly yes

  # ── OpenDKIM (DKIM signing milter) ─────────────────────────────────────────
  opendkim:
    build:
      context: ./docker/opendkim
      dockerfile: Dockerfile
    container_name: webpanel_opendkim
    restart: unless-stopped
    networks:
      - webpanel_net
    volumes:
      - dkim_keys:/etc/opendkim/keys

  # ── Postfix (outbound SMTP) ────────────────────────────────────────────────
  postfix:
    image: boky/postfix:latest
    container_name: webpanel_postfix
    restart: unless-stopped
    networks:
      - webpanel_net
    volumes:
      - postfix_data:/var/spool/postfix
    environment:
      - HOSTNAME=mail.${PANEL_DOMAIN}
      - RELAYHOST=${RELAYHOST:-}
      - ALLOWED_SENDER_DOMAINS=${ALLOWED_SENDER_DOMAINS:-}
      - POSTFIX_myhostname=mail.${PANEL_DOMAIN}
      - POSTFIX_smtpd_milters=inet:opendkim:8891
      - POSTFIX_non_smtpd_milters=inet:opendkim:8891
      - POSTFIX_milter_default_action=accept
    depends_on:
      - opendkim
    labels:
      - traefik.enable=true
      - traefik.tcp.routers.smtp.rule=HostSNI(`*`)
      - traefik.tcp.routers.smtp.entrypoints=smtp
      - traefik.tcp.routers.smtp.service=smtp
      - traefik.tcp.services.smtp.loadbalancer.server.port=25
      - traefik.tcp.routers.submission.rule=HostSNI(`*`)
      - traefik.tcp.routers.submission.entrypoints=submission
      - traefik.tcp.routers.submission.service=submission
      - traefik.tcp.services.submission.loadbalancer.server.port=587

  # ── Dovecot (IMAP/POP3) ────────────────────────────────────────────────────
  dovecot:
    image: dovecot/dovecot:latest
    container_name: webpanel_dovecot
    restart: unless-stopped
    networks:
      - webpanel_net
    volumes:
      - dovecot_data:/var/mail
    labels:
      - traefik.enable=true
      - traefik.tcp.routers.imap.rule=HostSNI(`*`)
      - traefik.tcp.routers.imap.entrypoints=imap
      - traefik.tcp.routers.imap.service=imap
      - traefik.tcp.services.imap.loadbalancer.server.port=143
      - traefik.tcp.routers.imaps.rule=HostSNI(`*`)
      - traefik.tcp.routers.imaps.entrypoints=imaps
      - traefik.tcp.routers.imaps.service=imaps
      - traefik.tcp.services.imaps.loadbalancer.server.port=993
      - traefik.tcp.routers.pop3.rule=HostSNI(`*`)
      - traefik.tcp.routers.pop3.entrypoints=pop3
      - traefik.tcp.routers.pop3.service=pop3
      - traefik.tcp.services.pop3.loadbalancer.server.port=110
      - traefik.tcp.routers.pop3s.rule=HostSNI(`*`)
      - traefik.tcp.routers.pop3s.entrypoints=pop3s
      - traefik.tcp.routers.pop3s.service=pop3s
      - traefik.tcp.services.pop3s.loadbalancer.server.port=995

  # ── WebPanel API ───────────────────────────────────────────────────────────
  webpanel:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: webpanel_api
    restart: unless-stopped
    networks:
      - webpanel_net
    ports:
      - "8000:8000"
    group_add:
      - "984"   # host docker GID — lets panelapi access /var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock   # manage customer containers
      - webpanel_sites:/var/webpanel/sites           # customer files
      - webpanel_db:/app/data                        # SQLite DB
      - ./frontend/dist:/app/frontend/dist:ro        # built React SPA
      - dkim_keys:/etc/opendkim/keys                 # write DKIM private keys + tables
      - /var/webpanel/panel_ssh:/var/webpanel/panel_ssh  # panel SSH keypair for container access
      - /var/webpanel/app-cache:/var/webpanel/app-cache  # marketplace app cache
      - /var/webpanel/localdns:/var/webpanel/localdns    # localdns hosts file (written by panel, read by dnsmasq)
    environment:
      - SECRET_KEY=${SECRET_KEY:-change_me_in_production}
      - SERVER_IP=${SERVER_IP}
      - PANEL_DOMAIN=${PANEL_DOMAIN}
      - DKIM_KEYS_DIR=/etc/opendkim/keys
      - MYSQL_HOST=mysql
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-changeme_mysql}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-changeme_redis}@redis:6379/0
      - PDNS_API_URL=http://powerdns:8081/api/v1/servers/localhost
      - PDNS_API_KEY=${PDNS_API_KEY:-changeme_pdns_key}
      - SMTP_HOST=postfix
      - SITES_ROOT=/var/webpanel/sites
      - DEBUG_LEVEL=${DEBUG_LEVEL:-0}
      - CONTAINER_API_TOKEN=${CONTAINER_API_TOKEN:-}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-changeme_mysql_root}
      - LOCALDNS_HOSTS_FILE=/var/webpanel/localdns/panel.hosts
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    labels:
      - traefik.enable=true
      - traefik.http.routers.webpanel-api.rule=Host(`${PANEL_DOMAIN}`) && PathPrefix(`/api`)
      - traefik.http.services.webpanel-api.loadbalancer.server.port=8000

  # ── Prometheus ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: webpanel_prometheus
    restart: unless-stopped
    networks:
      - webpanel_net
    volumes:
      - prometheus_data:/prometheus
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle

  # ── Grafana ────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: webpanel_grafana
    restart: unless-stopped
    networks:
      - webpanel_net
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-changeme_grafana}
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s:%(http_port)s/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_AUTH_ANONYMOUS_ENABLED=false
    labels:
      - traefik.enable=true
      - traefik.http.routers.grafana.rule=Host(`${PANEL_DOMAIN}`) && PathPrefix(`/grafana`)
      - traefik.http.services.grafana.loadbalancer.server.port=3000

  # ── Node Exporter (host metrics for Prometheus) ────────────────────────────
  node-exporter:
    image: prom/node-exporter:latest
    container_name: webpanel_node_exporter
    restart: unless-stopped
    networks:
      - webpanel_net
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - --path.procfs=/host/proc
      - --path.rootfs=/rootfs
      - --path.sysfs=/host/sys
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)

  # ── cAdvisor (container metrics for Prometheus) ────────────────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: webpanel_cadvisor
    restart: unless-stopped
    networks:
      - webpanel_net
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true

  # ── Local DNS (dnsmasq) ────────────────────────────────────────────────────
  # Resolves all panel domains → SERVER_IP so the host (and any machine
  # pointing at it) can access customer sites without real public DNS.
  # Port 5353 on the host (port 53 is taken by PowerDNS).
  # The panel API writes /var/webpanel/localdns/panel.hosts and sends
  # SIGHUP to reload dnsmasq whenever a domain is created / updated / deleted.
  localdns:
    build:
      context: ./docker/localdns
      dockerfile: Dockerfile
    container_name: webpanel_localdns
    restart: unless-stopped
    networks:
      - webpanel_net
    ports:
      - "5335:5300/udp"
      - "5335:5300/tcp"
    volumes:
      - /var/webpanel/localdns:/etc/localdns
    environment:
      - TZ=${TZ:-UTC}
