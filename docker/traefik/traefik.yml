api:
  dashboard: true
  insecure: true

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entrypoint:
          to: websecure
          scheme: https

  websecure:
    address: ":443"

  smtp:
    address: ":25"
  submission:
    address: ":587"
  imap:
    address: ":143"
  imaps:
    address: ":993"
  pop3:
    address: ":110"
  pop3s:
    address: ":995"

certificatesResolvers:
  le:
    acme:
      email: "ssl@example.com"  # overridden by TRAEFIK_CERTIFICATESRESOLVERS_LE_ACME_EMAIL env var
      storage: /certs/acme.json
      httpChallenge:
        entryPoint: web

providers:
  docker:
    # Route through docker-api-proxy (nginx) which rewrites legacy v1.24
    # API paths to v1.47, required for Docker Engine 29+ (min API 1.40).
    endpoint: "tcp://docker-api-proxy:2375"
    exposedByDefault: false
    network: webpanel_net

  file:
    directory: /etc/traefik/dynamic
    watch: true

log:
  level: INFO

accessLog: {}
