api:
  dashboard: true
  insecure: true

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entrypoint:
          to: websecure
          scheme: https

  websecure:
    address: ":443"

  smtp:
    address: ":25"
  submission:
    address: ":587"
  imap:
    address: ":143"
  imaps:
    address: ":993"
  pop3:
    address: ":110"
  pop3s:
    address: ":995"

certificatesResolvers:
  le:
    acme:
      email: "${ACME_EMAIL:-admin@example.com}"
      storage: /certs/acme.json
      httpChallenge:
        entryPoint: web

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: webpanel_net

  file:
    directory: /etc/traefik/dynamic
    watch: true

log:
  level: INFO

accessLog: {}
