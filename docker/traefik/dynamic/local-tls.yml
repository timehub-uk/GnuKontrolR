# ── Local / staging TLS config ───────────────────────────────────────────────
#
# Traefik falls back to a built-in self-signed cert when Let's Encrypt has not
# yet issued a certificate (e.g. during local testing or staging).  This config
# sets sane TLS options for all HTTPS routes.
#
# For local development:
#   - Customers and admins will see a browser TLS warning until real LE certs
#     are issued.  Accept the warning once or import the server's cert into
#     your browser trust store.
#   - Generate a locally-trusted cert with:
#       mkcert -install
#       mkcert "*.yourdomain.com" yourdomain.com
#     then reference it below as the defaultCertificate.
# ─────────────────────────────────────────────────────────────────────────────

tls:
  options:
    default:
      minVersion: VersionTLS12
      cipherSuites:
        - TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305
        - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305
      sniStrict: false   # allow requests without SNI (curl, older clients)

  # Self-signed wildcard cert for local/staging use.
  # Generated by setup.sh install / repair and valid for 10 years.
  # Replace with a real cert (or use ACME) for production.
  stores:
    default:
      defaultCertificate:
        certFile: /certs/local.crt
        keyFile:  /certs/local.key
