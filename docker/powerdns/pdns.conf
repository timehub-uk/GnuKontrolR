launch=gsqlite3
gsqlite3-database=/var/lib/powerdns/pdns.sqlite3
gsqlite3-dnssec=yes
gsqlite3-pragma-journal-mode=WAL
gsqlite3-pragma-synchronous=NORMAL

webserver=yes
webserver-address=0.0.0.0
webserver-port=8081
# Restrict API to Docker internal bridge only — not reachable from outside webpanel_net
webserver-allow-from=127.0.0.1,172.30.0.0/16

api=yes
# API key loaded from environment variable via Docker Compose (PDNS_AUTH_API_KEY)
# Do NOT commit real keys here — use .env / secrets management
api-key=6a7f4acdbe16d54bd2d5be140870f9b21dc89c09d0aef2ce09f5b4c0471f03e7

local-address=0.0.0.0
local-port=53

dnsupdate=yes
log-dns-queries=no
log-dns-details=yes
