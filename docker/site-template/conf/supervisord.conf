[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
loglevel=info

[unix_http_server]
file=/var/run/supervisor.sock
chmod=0700

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[program:mysql]
; Private MariaDB instance — data in /var/db/mysql, socket in /var/run/mysqld/
command=/usr/sbin/mariadbd --user=mysql --datadir=/var/db/mysql --socket=/var/run/mysqld/mysqld.sock --pid-file=/var/run/mysqld/mysqld.pid --skip-networking
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/mysql.err
stdout_logfile=/var/log/supervisor/mysql.out
priority=5

[program:php-fpm]
command=php-fpm --nodaemonize
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/php-fpm.err
stdout_logfile=/var/log/supervisor/php-fpm.out
priority=10

[program:nginx]
command=nginx -g "daemon off;"
autostart=%(ENV_WEB_SERVER_IS_NGINX)s
autorestart=true
stderr_logfile=/var/log/supervisor/nginx.err
stdout_logfile=/var/log/supervisor/nginx.out
priority=20

[program:apache2]
command=apache2ctl -DFOREGROUND
autostart=%(ENV_WEB_SERVER_IS_APACHE)s
autorestart=true
stderr_logfile=/var/log/supervisor/apache2.err
stdout_logfile=/var/log/supervisor/apache2.out
priority=20

[program:lighttpd]
command=lighttpd -D -f /etc/lighttpd/lighttpd.conf
autostart=%(ENV_WEB_SERVER_IS_LIGHTTPD)s
autorestart=true
stderr_logfile=/var/log/supervisor/lighttpd.err
stdout_logfile=/var/log/supervisor/lighttpd.out
priority=20

[program:node]
command=pm2-runtime start %(ENV_NODE_APP)s --name site-app
autostart=%(ENV_NODE_ENABLED)s
autorestart=true
stderr_logfile=/var/log/supervisor/node.err
stdout_logfile=/var/log/supervisor/node.out
priority=30

[program:sshd]
command=/usr/sbin/sshd -D -e
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/sshd.err
stdout_logfile=/var/log/supervisor/sshd.out
priority=5

[program:container-api]
; Runs as root inside the isolated container — manages /var/config (secure area)
; and /var/www/html (web root). The container itself is the isolation boundary.
; Port 9000 is internal (webpanel_net only), never exposed to the public internet.
; Customer access (SSH/PHP as www-data) cannot escape the container.
command=python3 /container_api.py
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/container-api.err
stdout_logfile=/var/log/supervisor/container-api.out
priority=15
