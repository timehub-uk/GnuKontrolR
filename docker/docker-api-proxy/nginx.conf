user root;
worker_processes 1;
error_log /dev/stderr warn;
pid /var/run/nginx.pid;

events {
    worker_connections 256;
}

http {
    access_log off;
    client_max_body_size 0;

    # Upstream: Docker Unix socket
    upstream docker_socket {
        server unix:/var/run/docker.sock;
        keepalive 32;
    }

    server {
        listen 2375;

        # Rewrite any legacy API version (< 1.40) to 1.47 so Docker Engine 29+
        # accepts the request.  Traefik v3 sends v1.24 during SDK negotiation.
        location ~ "^/v(1\.[0-3][0-9])(/.*)$" {
            rewrite "^/v1\.[0-3][0-9](/.*)$" /v1.47$1 break;
            proxy_pass         http://docker_socket;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_read_timeout 300s;
            proxy_request_buffering off;
            proxy_buffering    off;
        }

        # All other requests (modern API version or unversioned) pass through
        location / {
            proxy_pass         http://docker_socket;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_read_timeout 300s;
            proxy_request_buffering off;
            proxy_buffering    off;
        }
    }
}
