# OpenDKIM milter configuration
# Keys are stored in /etc/opendkim/keys/{domain}/mail.private
# Tables are auto-generated by the panel at /etc/opendkim/signing.table
# and /etc/opendkim/key.table

Syslog                  yes
SyslogSuccess           yes
LogWhy                  yes

Canonicalization        relaxed/simple
Mode                    sv
SubDomains              no

KeyTable                refile:/etc/opendkim/keys/key.table
SigningTable            refile:/etc/opendkim/keys/signing.table
ExternalIgnoreList      /etc/opendkim/trusted.hosts
InternalHosts           /etc/opendkim/trusted.hosts

Socket                  inet:8891@0.0.0.0
PidFile                 /var/run/opendkim/opendkim.pid
UMask                   002

# Auto-restart on temporary failures
AutoRestart             yes
AutoRestartRate         10/1m
