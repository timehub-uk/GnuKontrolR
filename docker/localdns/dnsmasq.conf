# ── Upstream resolvers ────────────────────────────────────────────────────────
server=8.8.8.8
server=1.1.1.1

# ── Listen config ─────────────────────────────────────────────────────────────
# Use an internal port (Docker's embedded DNS owns 53 inside containers)
port=5300

# ── Hosts ─────────────────────────────────────────────────────────────────────
# Don't pull in the container's /etc/hosts
no-hosts
# Panel-managed domain entries — updated by the webpanel API, reloaded on SIGHUP
addn-hosts=/etc/localdns/panel.hosts

# ── Cache / reliability ───────────────────────────────────────────────────────
cache-size=1000
domain-needed
bogus-priv
